[DEFAULT]
main-repo = gentoo

[gentoo]
location = /var/db/repos/gentoo
sync-type = rsync
sync-uri = rsync://rsync.gentoo.org/gentoo-portage
auto-sync = yes

[cosmic-overlay]
location = /var/db/repos/cosmic-overlay
sync-type = git
sync-uri = https://github.com/fsvm88/cosmic-overlay.git
auto-sync = yes

[regicide-rust]
location = /var/db/repos/regicide-rust
# This overlay lives inside the RegicideOS repo at overlays/regicide-rust/
# Clone the repo and symlink: ln -sf /path/to/RegicideOS/overlays/regicide-rust /var/db/repos/regicide-rust
auto-sync = no
